<head>

        h2 { margin-top: 0; color: #111; text-align: center; }

    </style>
</head>
<body>

<div class="card">
    <h2>Hisoblagich</h2>
    <div class="form-group">
        <label>Kvadrat (kv):</label>
        <input type="number" id="kv" value="1">
    </div>
    <div class="form-group">
        <label>Kun (chislo):</label>
        <input type="number" id="d" value="1" min="1" max="31">
    </div>
    <div class="form-group">
        <label>Oy (oy):</label>
        <input type="number" id="m" value="1" min="1" max="12">
    </div>
    <div class="form-group">
        <label>Yil (god - masalan: 26):</label>
        <input type="number" id="yr" value="26">
    </div>
    <div class="form-group">
        <label>To'langan summa (p):</label>
        <input type="number" id="p" value="0">
    </div>
    <button onclick="calculate()">Hisoblash</button>

    <div class="results" id="output" style="display:none;">
        <div class="result-item"><span>Kunlik qoldiq (day):</span> <b id="res-day">0</b></div>
        <div class="result-item"><span>Tarif 1,500:</span> <b id="res-frmn1">0</b></div>
        <div class="result-item"><span>Tarif 2,000:</span> <b id="res-frmn2">0</b></div>
        <div class="result-item"><span>Davr uchun hisob:</span> <b id="res-s">0</b></div>
        <div class="result-item"><span>To'lovlar:</span> <b id="res-p">0</b></div>
        <hr style="border: 0; border-top: 1px solid #e2e8f0;">
        <div class="result-item" style="font-size: 18px;"><span>Balans / Qarzi:</span> <b id="res-debt">0</b></div>
    </div>
</div>

<script>
function checkDays(m, yr) {
    if ([1, 3, 5, 7, 8, 10, 12].includes(m)) return 31;
    if (m === 2) return yr === 24 ? 29 : 28;
    return 30;
}

function calculate() {
    let kv = parseInt(document.getElementById('kv').value) || 0;
    let d = parseInt(document.getElementById('d').value) || 0;
    let m = parseInt(document.getElementById('m').value) || 0;
    let yr = parseInt(document.getElementById('yr').value) || 0;
    let p = parseInt(document.getElementById('p').value) || 0;

    let frmn1 = kv * 1500;
    let frmn2 = kv * 2000;
    let day = 0;
    let s = 0;

    // Kunlik hisob (countday)
    let days = checkDays(m, yr);
    let currentFrmn = (yr < 23 || (yr === 23 && m < 5)) ? frmn1 : frmn2;
    day = Math.floor((1.0 * currentFrmn / days) * (days - d + 1));

    // Davriy oylarni hisoblash logikasi (C++ kodi bo'yicha)
    if (yr === 26) s += frmn2 * (4 - m);
    else if (yr === 25) s += frmn2 * (4 + 12 - m);
    else if (yr === 24) s += frmn2 * (4 + 12 + 12 - m);
    else if (yr === 23) {
        if (m < 5) s += frmn1 * (4 - m) + frmn2 * (4 + 24 + 8);
        else s += frmn2 * (4 + 24 + 12 - m);
    }
    else if (yr === 22) s += frmn1 * (4 + 12 - m) + frmn2 * (4 + 24 + 8);
    else s += frmn1 * (4 + 24 - m) + frmn2 * (4 + 24 + 8);

    s += day;
    let finalDebt = s - p;

    // Natijalarni ekranga chiqarish
    document.getElementById('res-day').innerText = day.toLocaleString();
    document.getElementById('res-frmn1').innerText = frmn1.toLocaleString();
    document.getElementById('res-frmn2').innerText = frmn2.toLocaleString();
    document.getElementById('res-s').innerText = s.toLocaleString();
    document.getElementById('res-p').innerText = p.toLocaleString();
    
    let debtEl = document.getElementById('res-debt');
    debtEl.innerText = finalDebt.toLocaleString() + " so'm";
    if(finalDebt > 0) {
        debtEl.className = "debt";
    } else {
        debtEl.className = "surplus";
    }

    document.getElementById('output').style.display = 'block';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка абонента</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f3f4f6;

            color: #333;
        }

        .card {
            max-width: 500px;

        }

            font-weight: bold;
        }

            color: #16a34a;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Калькулятор</h2>
        <div class="form-group">
            <label>Плошадь (м2):</label>
            <input type="number" id="kv" value="0" >
        </div>

        <div class="form-group">
            <label for="sana">Дата регистрации:</label>
            <input
            type="date"
            id="sana"
            name="sana"
            min="2020-01-01"
            max="2030-12-31"
        >
        </div>

        <div class="form-group">
            <label>To'langan summa (p):</label>
            <input type="number" id="p" value="0">
        </div>

        <button onclick="calculate()">Hisoblash</button>

        <div class="results" id="output" style="display:none;">
            <div class="result-item"><span>Kunlik qoldiq (day):</span> <b id="res-day">0</b></div>
            <div class="result-item"><span>Tarif 1,500:</span> <b id="res-frmn1">0</b></div>
            <div class="result-item"><span>Tarif 2,000:</span> <b id="res-frmn2">0</b></div>
            <div class="result-item"><span>Davr uchun hisob:</span> <b id="res-s">0</b></div>
            <div class="result-item"><span>To'lovlar:</span> <b id="res-p">0</b></div>
            <hr style="border: 0; border-top: 1px solid #e2e8f0;">
            <div class="result-item" style="font-size: 18px;"><span>Balans / Qarzi:</span> <b id="res-debt">0</b></div>
        </div>
    </div>

    <script>
        function checkDays(m, yr) {
    if ([1, 3, 5, 7, 8, 10, 12].includes(m)) return 31;
    if (m === 2) {
        // Kabisa yillarini tekshirish (2024, 2028 yillar uchun 'yr' qiymati 24 va 28 bo'ladi)
        return (yr === 24 || yr === 28) ? 29 : 28;
    }
    return 30;
}

function calculate() {
    let kv = parseInt(document.getElementById('kv').value) || 0;
    let sanaInput = document.getElementById('sana').value;
    let p = parseInt(document.getElementById('p').value) || 0;

    if (!sanaInput) {
        alert("Iltimos, sanani tanlang!");
        return;
    }

    // Sanadan kun, oy va yilni ajratib olish
    let dateObj = new Date(sanaInput);
    let d = dateObj.getDate();
    let m = dateObj.getMonth() + 1; // JSda oylar 0 dan boshlanadi
    let yr = dateObj.getFullYear() % 100; // Masalan: 2026 -> 26

    let frmn1 = kv * 1500;
    let frmn2 = kv * 2000;
    let day = 0;
    let s = 0;

    // Kunlik hisob (countday)
    let days = checkDays(m, yr);
    let currentFrmn = (yr < 23 || (yr === 23 && m < 5)) ? frmn1 : frmn2;
    day = Math.floor((1.0 * currentFrmn / days) * (days - d + 1));

    // Davriy oylarni hisoblash logikasi (C++ kodi bo'yicha)
    if (yr === 26) s += frmn2 * (4 - m);
    else if (yr === 25) s += frmn2 * (4 + 12 - m);
    else if (yr === 24) s += frmn2 * (4 + 12 + 12 - m);
    else if (yr === 23) {
        if (m < 5) s += frmn1 * (4 - m) + frmn2 * (4 + 24 + 8);
        else s += frmn2 * (4 + 24 + 12 - m);
    }
    else if (yr === 22) s += frmn1 * (4 + 12 - m) + frmn2 * (4 + 24 + 8);
    else s += frmn1 * (4 + 24 - m) + frmn2 * (4 + 24 + 8);

    s += day;
    let finalDebt = s - p;

    // Natijalarni ekranga chiqarish
    document.getElementById('res-day').innerText = day.toLocaleString();
    document.getElementById('res-frmn1').innerText = frmn1.toLocaleString();
    document.getElementById('res-frmn2').innerText = frmn2.toLocaleString();
    document.getElementById('res-s').innerText = s.toLocaleString();
    document.getElementById('res-p').innerText = p.toLocaleString();
    
    let debtEl = document.getElementById('res-debt');
    debtEl.innerText = finalDebt.toLocaleString() + " so'm";
    if(finalDebt > 0) {
        debtEl.className = "debt";
    } else {
        debtEl.className = "surplus";
    }

    document.getElementById('output').style.display = 'block';
}
    </script>
</body>

</html>
