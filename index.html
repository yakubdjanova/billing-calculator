<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка абонента</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f3f4f6;
            padding: 20px;
            color: #333;
        }

        .card {
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
        }

        h2 {
            margin-top: 0;
            color: #111;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .add-btn {
            background: #10b981;
            padding: 8px 12px;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 15px;
            display: inline-block;
            width: auto;
        }
        .add-btn:hover {
            background: #059669;
        }

        .payment-row {
            margin-bottom: 8px;
        }

        .results {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .debt {
            color: #dc2626;
            font-weight: bold;
        }

        .surplus {
            color: #16a34a;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Калькулятор</h2>
        <div class="form-group">
            <label>Площадь (м2):</label>
            <input type="text" id="kv" value="0">
        </div>

        <div class="form-group" lang="ru">
            <label for="sana">Дата регистрации:</label>
            <input type="date" id="sana" name="sana" min="2020-01-01" max="2030-12-31">
        </div>

        <div class="form-group">
            <label>Оплаты:</label>
            <div id="payments-container">
                <div class="payment-row">
                    <input type="text" class="payment-input" value="0">
                </div>
            </div>
            <button type="button" class="add-btn" onclick="addPaymentField()">+ Добавить оплату</button>
        </div>

        <button onclick="calculate()">Расчитать</button>

        <div class="results" id="output" style="display:none;">
            <div class="result-item"><span>Kunlik qoldiq (day):</span> <b id="res-day">0</b></div>
            <div class="result-item"><span>Тариф 1,500:</span> <b id="res-frmn1">0</b></div>
            <div class="result-item"><span>Тариф 2,000:</span> <b id="res-frmn2">0</b></div>
            <div class="result-item"><span>Начисление за период:</span> <b id="res-s">0</b></div>
            <div class="result-item"><span>Оплата за период:</span> <b id="res-p">0</b></div>
            <hr style="border: 0; border-top: 1px solid #e2e8f0;">
            <div class="result-item" style="font-size: 18px;"><b>Баланс / Долг:</b> <b id="res-debt">0</b></div>
        </div>
    </div>

    <script>
        function checkDays(m, yr) {
            if ([1, 3, 5, 7, 8, 10, 12].includes(m)) return 31;
            if (m === 2) {
                return (yr === 24 || yr === 28) ? 29 : 28;
            }
            return 30;
        }

        function addPaymentField() {
            const container = document.getElementById('payments-container');
            const row = document.createElement('div');
            row.className = 'payment-row';
            row.innerHTML = '<input type="text" class="payment-input" value="0">';
            container.appendChild(row);
            
            row.querySelector('input').focus();
            setupEnterNavigation();
        }

        // Молиявий рақамларни 2 хонагача яхлитлаб ва чиройли ажратиб чиқариш функцияси
        function formatNumber(num) {
            return num.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function calculate() {
            let kvInput = document.getElementById('kv').value.replace(',', '.');
            let kv = parseFloat(kvInput) || 0;
            
            let sanaInput = document.getElementById('sana').value;
            
            let totalPayments = 0;
            let paymentInputs = document.querySelectorAll('.payment-input');
            paymentInputs.forEach(input => {
                let pInput = input.value.replace(',', '.');
                totalPayments += parseFloat(pInput) || 0;
            });

            if (!sanaInput) {
                alert("Пожалуйста, выведите дату!");
                return;
            }

            let dateObj = new Date(sanaInput);
            let d = dateObj.getDate();
            let m = dateObj.getMonth() + 1; 
            let yr = dateObj.getFullYear() % 100; 

            let frmn1 = kv * 1500;
            let frmn2 = kv * 2000;
            let day = 0;
            let s = 0;

            let days = checkDays(m, yr);
            let currentFrmn = (yr < 23 || (yr === 23 && m < 5)) ? frmn1 : frmn2;
            
            // Кунлик ҳисоб ва уни дарров 2 хонагача яхлитлаш
            let rawDay = (1.0 * currentFrmn / days) * (days - d + 1);
            day = parseFloat(rawDay.toFixed(2));

            // Тарифларни ҳам 2 хонагача аниқликда оламиз
            frmn1 = parseFloat(frmn1.toFixed(2));
            frmn2 = parseFloat(frmn2.toFixed(2));

            if (yr === 26) s += frmn2 * (4 - m);
            else if (yr === 25) s += frmn2 * (4 + 12 - m);
            else if (yr === 24) s += frmn2 * (4 + 12 + 12 - m);
            else if (yr === 23) {
                if (m < 5) s += frmn1 * (4 - m) + frmn2 * (4 + 24 + 8);
                else s += frmn2 * (4 + 24 + 12 - m);
            }
            else if (yr === 22) s += frmn1 * (4 + 12 - m) + frmn2 * (4 + 24 + 8);
            else s += frmn1 * (4 + 24 - m) + frmn2 * (4 + 24 + 8);

            // Умумий суммани ҳисоблаб, 2 хонагача яхлитлаймиз
            s = parseFloat((s + day).toFixed(2));
            totalPayments = parseFloat(totalPayments.toFixed(2));
            
            let finalDebt = parseFloat((s - totalPayments).toFixed(2));

            // Экранга форматлаб (копейкалари/тийинлари билан) чиқариш
            document.getElementById('res-day').innerText = formatNumber(day);
            document.getElementById('res-frmn1').innerText = formatNumber(frmn1);
            document.getElementById('res-frmn2').innerText = formatNumber(frmn2);
            document.getElementById('res-s').innerText = formatNumber(s);
            document.getElementById('res-p').innerText = formatNumber(totalPayments);
            
            let debtEl = document.getElementById('res-debt');
            debtEl.innerText = formatNumber(finalDebt) + " сум";
            
            // Баланс ранги (агар қарз 1 тийиндан кўп бўлса қизил, бўлмаса яшил)
            if(finalDebt > 0.01) {
                debtEl.className = "debt";
            } else {
                debtEl.className = "surplus";
            }

            document.getElementById('output').style.display = 'block';
        }

        // --- ENTER ОРҚАЛИ КЕЙИНГИ КАТАККА ЎТИШ КОДИ ---
        function setupEnterNavigation() {
            const staticInputs = [
                document.getElementById('kv'),
                document.getElementById('sana')
            ];
            const dynamicPayments = Array.from(document.querySelectorAll('.payment-input'));
            const allInputs = staticInputs.concat(dynamicPayments);

            allInputs.forEach((input, index) => {
                input.onkeydown = null; 
                input.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') {
                        event.preventDefault(); 
                        if (index < allInputs.length - 1) {
                            allInputs[index + 1].focus(); 
                        } else {
                            calculate(); 
                        }
                    }
                });
            });
        }

        setupEnterNavigation();
    </script>
</body>

</html>
